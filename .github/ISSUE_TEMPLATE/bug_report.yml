name: Bug report
description: Report a reproducible GradleMC problem with useful evidence.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a GradleMC bug. Fill this out properly so the issue can be reproduced instead of becoming detective work.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues first.
          required: true
        - label: I am using a Minecraft, loader, GradleMC, Java, and jar combination listed in the supported release matrix.
          required: true
        - label: I reviewed any logs/reports for private information before sharing.
          required: true

  - type: input
    id: gradlemc-version
    attributes:
      label: GradleMC version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "26.1.2"
    validations:
      required: true

  - type: dropdown
    id: loader
    attributes:
      label: Mod loader
      options:
        - Forge
        - Fabric
        - NeoForge
        - Quilt
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Loader version
      description: Enter the exact Forge, Fabric Loader/API, NeoForge, or Quilt version used.
      placeholder: "NeoForge 26.1.2.78"
    validations:
      required: true

  - type: input
    id: artifact
    attributes:
      label: Exact GradleMC jar filename
      placeholder: "gradlemc-neoforge-26.1.2-1.0.0.jar"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "25"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Client
        - Integrated server / single-player
        - Dedicated server
        - Both client and dedicated server
        - Not sure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps. Include commands such as /gradlemc status or /gradlemc gui when relevant.
      placeholder: |
        1. Install ...
        2. Run ...
        3. Click ...
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: reports
    attributes:
      label: GradleMC report or command output
      description: Paste relevant snippets from /gradlemc export, /gradlemc reports latest, or other GradleMC output. Do not paste private data.
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Relevant log snippets
      description: Paste the relevant part of latest.log or crash output if safe to share.
      render: text

  - type: textarea
    id: modpack-context
    attributes:
      label: Modpack context
      description: Mention approximate mod count, whether it reproduces with only GradleMC, and any known conflicting mods.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or clips
      description: Add screenshots or short clips for GUI/overlay/rendering problems.
