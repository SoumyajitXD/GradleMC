name: Scheduled Forge 1.20.1 V1.0.3 finalizer

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: forge-1.20.1-v1.0.3-scheduled-finalizer
  cancel-in-progress: false

jobs:
  finalize-main:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle
            GradleMC/Forge/Minecraft 1.20.1/gradle.properties
            GradleMC/Forge/Minecraft 1.20.1/gradle/wrapper/gradle-wrapper.properties

      - name: Apply or confirm V1.0.3 synchronization
        shell: bash
        run: |
          set -euo pipefail
          project='GradleMC/Forge/Minecraft 1.20.1'
          if grep -Fxq 'mod_version=1.0.3' "$project/gradle.properties"; then
            echo 'V1.0.3 source synchronization is already present.'
          else
            test -f .github/scripts/release_sync_1_0_3.py
            python .github/scripts/release_sync_1_0_3.py
          fi

          rm -f .github/release-sync-trigger.txt
          rm -f .github/release-sync-trigger-2.txt
          rm -f .github/scripts/release_sync_1_0_3.py
          rm -f .github/workflows/release-sync-1.0.3.yml
          rm -f .github/workflows/release-sync-auto-merge.yml
          rm -f .github/workflows/release-sync-ready.yml
          rm -f .github/workflows/release-sync-new-pr.yml
          rm -f .github/workflows/post-merge-v1.0.3-finalizer.yml
          rm -f .github/workflows/scheduled-v1.0.3-finalizer.yml
          rm -f 'Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.2-forge-1.20.1.jar'

      - name: Verify tracked V1.0.3 release jar
        shell: bash
        run: |
          set -euo pipefail
          jar_path='Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.3-forge-1.20.1.jar'
          test -f "$jar_path"
          jar tf "$jar_path" >/dev/null
          test ! -e 'Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.2-forge-1.20.1.jar'

      - name: Build and test Forge 1.20.1
        working-directory: GradleMC/Forge/Minecraft 1.20.1
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
          ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
          test -f build/libs/gradlemc-1.0.3-forge-1.20.1.jar
          jar tf build/libs/gradlemc-1.0.3-forge-1.20.1.jar >/dev/null

      - name: Verify synchronized repository surface
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx 'mod_version=1.0.3' 'GradleMC/Forge/Minecraft 1.20.1/gradle.properties'
          grep -Fx 'artifact_name=gradlemc-1.0.3-forge-1.20.1.jar' 'GradleMC/Forge/Minecraft 1.20.1/gradle.properties'
          grep -F 'OVERLAY_SHOW_BRANDING' 'GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/config/GradleMCConfig.java'
          grep -F 'OVERLAY_SHOW_AVERAGE_FPS' 'GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/config/GradleMCConfig.java'
          grep -F 'withCurrentFps(minecraft.getFps())' 'GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/client/overlay/GradleMCStatsOverlay.java'
          grep -F 'gradlemc-1.0.3-forge-1.20.1.jar' README.md CHANGELOG.md ROADMAP.md SUPPORT.md SECURITY.md CONTRIBUTING.md AGENTS.md docs/RELEASE_CHECKLIST.md curseforge-description.html .github/workflows/ci.yml
          stale="$(git grep -n 'gradlemc-1.0.2-forge-1.20.1.jar' -- . ':(exclude)CHANGELOG.md' || true)"
          if [[ -n "$stale" ]]; then
            echo 'Unexpected stale V1.0.2 references:'
            echo "$stale"
            exit 1
          fi
          for temp in \
            .github/release-sync-trigger.txt \
            .github/release-sync-trigger-2.txt \
            .github/scripts/release_sync_1_0_3.py \
            .github/workflows/release-sync-1.0.3.yml \
            .github/workflows/release-sync-auto-merge.yml \
            .github/workflows/release-sync-ready.yml \
            .github/workflows/release-sync-new-pr.yml \
            .github/workflows/post-merge-v1.0.3-finalizer.yml \
            .github/workflows/scheduled-v1.0.3-finalizer.yml; do
            test ! -e "$temp"
          done

      - name: Commit finalized repository state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo 'No finalization changes found.'; exit 0; }
          git commit -m 'Finalize Forge 1.20.1 V1.0.3 repository sync'
          git push origin HEAD:main
