name: GradleMC CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: "GradleMC/Forge/Minecraft 1.20.1"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.warning.mode=all"

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Validate repository layout
        shell: bash
        run: |
          set -euo pipefail

          [[ -f LICENSE ]] || { echo "Missing LICENSE." >&2; exit 1; }
          [[ -f README.md ]] || { echo "Missing README.md." >&2; exit 1; }
          [[ -d ".github/workflows" ]] || { echo "Missing root GitHub workflows directory." >&2; exit 1; }
          [[ -f ".github/workflows/ci.yml" ]] || { echo "Missing root CI workflow." >&2; exit 1; }
          [[ -d "$PROJECT_DIR" ]] || { echo "Missing source directory: $PROJECT_DIR" >&2; exit 1; }

          for stale_root in "SOURCE CODE" "SOURCE CODEs"; do
            if [[ -e "$stale_root" ]]; then
              echo "Stale source root exists: $stale_root" >&2
              exit 1
            fi
          done

          nested_workflows="$(find GradleMC -path '*/.github/workflows' -type d -print || true)"
          if [[ -n "$nested_workflows" ]]; then
            echo "Inactive nested workflows found below GradleMC. GitHub only runs workflows from the repository-root .github/workflows directory." >&2
            echo "$nested_workflows" >&2
            exit 1
          fi

          required_files=(
            "$PROJECT_DIR/gradlew"
            "$PROJECT_DIR/gradlew.bat"
            "$PROJECT_DIR/settings.gradle"
            "$PROJECT_DIR/build.gradle"
            "$PROJECT_DIR/gradle.properties"
            "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar"
            "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties"
            "$PROJECT_DIR/src/main/resources/META-INF/mods.toml"
            "$PROJECT_DIR/src/main/resources/pack.mcmeta"
            "$PROJECT_DIR/src/test/java/com/soumyajit/gradlemc/GradleMcSelfTest.java"
          )

          for required_file in "${required_files[@]}"; do
            [[ -f "$required_file" ]] || { echo "Missing required file: $required_file" >&2; exit 1; }
          done

          java_source_count="$(find "$PROJECT_DIR/src/main/java" -type f -name '*.java' | wc -l | tr -d ' ')"
          test_source_count="$(find "$PROJECT_DIR/src/test/java" -type f -name '*.java' | wc -l | tr -d ' ')"
          if (( java_source_count == 0 )); then
            echo "No Java sources found under $PROJECT_DIR/src/main/java" >&2
            exit 1
          fi
          if (( test_source_count == 0 )); then
            echo "No Java self-test sources found under $PROJECT_DIR/src/test/java" >&2
            exit 1
          fi
          echo "Java source files: $java_source_count"
          echo "Java self-test files: $test_source_count"

      - name: Validate screenshot documentation
        shell: bash
        run: |
          set -euo pipefail

          [[ -d Screenshots ]] || { echo "Missing Screenshots directory." >&2; exit 1; }
          [[ -f docs/SCREENSHOTS.md ]] || { echo "Missing docs/SCREENSHOTS.md." >&2; exit 1; }
          [[ -f docs/SCREENSHOT_PLAN.md ]] || { echo "Missing docs/SCREENSHOT_PLAN.md." >&2; exit 1; }

          for screenshot_id in {0..13}; do
            screenshot="Screenshots/${screenshot_id}.png"
            [[ -f "$screenshot" ]] || { echo "Missing screenshot: $screenshot" >&2; exit 1; }
          done

          grep -F 'Screenshots/0.png' README.md >/dev/null || {
            echo "README.md does not reference the main screenshot preview." >&2
            exit 1
          }
          grep -F '../Screenshots/13.png' docs/SCREENSHOTS.md >/dev/null || {
            echo "docs/SCREENSHOTS.md does not reference the complete screenshot set." >&2
            exit 1
          }

      - name: Validate release identity
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_id="$(get_property mod_id)"
          mod_version="$(get_property mod_version)"
          minecraft_version="$(get_property minecraft_version)"
          forge_version="$(get_property forge_version)"
          loader_name="$(get_property loader_name)"
          variant_name="$(get_property variant_name)"
          artifact_name="$(get_property artifact_name)"
          expected_artifact="${mod_id}-${mod_version}-${variant_name}.jar"

          [[ "$mod_id" =~ ^[a-z][a-z0-9_]{1,63}$ ]] || { echo "Invalid mod_id: $mod_id" >&2; exit 1; }
          [[ -n "$mod_version" ]] || { echo "mod_version is empty." >&2; exit 1; }
          [[ "$minecraft_version" == "1.20.1" ]] || { echo "Unexpected minecraft_version: $minecraft_version" >&2; exit 1; }
          [[ -n "$forge_version" ]] || { echo "forge_version is empty." >&2; exit 1; }
          [[ "$loader_name" == "forge" ]] || { echo "Unexpected loader_name: $loader_name" >&2; exit 1; }
          [[ "$variant_name" == "forge-$minecraft_version" ]] || { echo "variant_name must be forge-$minecraft_version, got $variant_name." >&2; exit 1; }
          [[ "$artifact_name" == "$expected_artifact" ]] || {
            echo "artifact_name mismatch. Expected '$expected_artifact', got '$artifact_name'." >&2
            exit 1
          }

          grep -F "rootProject.name = 'GradleMC'" settings.gradle >/dev/null || {
            echo "settings.gradle rootProject.name is not GradleMC." >&2
            exit 1
          }
          grep -R --include='*.java' -F "public static final String MOD_ID = \"$mod_id\";" src/main/java >/dev/null || {
            echo "No Java MOD_ID constant matches gradle.properties mod_id=$mod_id." >&2
            exit 1
          }
          grep -R --include='*.java' -F "public static final String CURRENT_VARIANT_ID = \"$variant_name\";" src/main/java >/dev/null || {
            echo "No Java CURRENT_VARIANT_ID constant matches variant_name=$variant_name." >&2
            exit 1
          }

          echo "mod_id=$mod_id"
          echo "mod_version=$mod_version"
          echo "minecraft_version=$minecraft_version"
          echo "forge_version=$forge_version"
          echo "variant_name=$variant_name"
          echo "artifact_name=$artifact_name"

      - name: Check tracked junk and sensitive text
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' tracked_files < <(git ls-files -z)

          bad_files=()
          unexpected_jars=()
          for tracked_file in "${tracked_files[@]}"; do
            case "$tracked_file" in
              */build/*|*/.gradle/*|*.class|*.tmp|*.bak)
                bad_files+=("$tracked_file")
                ;;
            esac
            case "$tracked_file" in
              */gradle/wrapper/gradle-wrapper.jar)
                ;;
              *.jar)
                unexpected_jars+=("$tracked_file")
                ;;
            esac
          done

          if (( ${#bad_files[@]} > 0 )); then
            echo "Generated or junk files are tracked. Delete them; CI should create them." >&2
            printf ' - %s\n' "${bad_files[@]}" >&2
            exit 1
          fi

          if (( ${#unexpected_jars[@]} > 0 )); then
            echo "Unexpected committed jar files found:" >&2
            printf ' - %s\n' "${unexpected_jars[@]}" >&2
            exit 1
          fi

          pat_a='ghp_[A-Za-z0-9_]{30,}'
          pat_b='github_pat_[A-Za-z0-9_]{30,}'
          pat_c='s''k-[A-Za-z0-9]{20,}'
          sensitive_pattern="(${pat_a}|${pat_b}|${pat_c})"
          if git grep -IInE "$sensitive_pattern" -- . ':(exclude)*.png' ':(exclude)*.jpg' ':(exclude)*.jpeg' ':(exclude)*.webp' ':(exclude)*.gif' ':(exclude)*.jar'; then
            echo "Possible sensitive value found in tracked text." >&2
            exit 1
          fi

  forge-build:
    name: Forge 1.20.1 verification and build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: repository-sanity
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle.kts
            GradleMC/Forge/Minecraft 1.20.1/gradle.properties
            GradleMC/Forge/Minecraft 1.20.1/gradle/wrapper/gradle-wrapper.properties

      - name: Prepare Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null
          distribution_url="$(sed -n 's/^distributionUrl=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          [[ "$distribution_url" == https\://services.gradle.org/distributions/gradle-*-bin.zip ]] || {
            echo "Unexpected Gradle wrapper distributionUrl: $distribution_url" >&2
            exit 1
          }
          timeout_ms="$(sed -n 's/^networkTimeout=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          [[ "$timeout_ms" =~ ^[0-9]+$ ]] || { echo "Invalid Gradle wrapper networkTimeout: $timeout_ms" >&2; exit 1; }
          if (( timeout_ms < 60000 )); then
            echo "Bumping Gradle wrapper networkTimeout locally for CI: ${timeout_ms}ms -> 60000ms"
            sed -i 's/^networkTimeout=.*/networkTimeout=60000/' gradle/wrapper/gradle-wrapper.properties
          fi
          ./gradlew --no-daemon --version

      - name: Run Gradle checks and self-tests
        shell: bash
        run: ./gradlew --no-daemon --stacktrace --warning-mode all check gradlemcSelfTest

      - name: Build mod jar
        shell: bash
        run: ./gradlew --no-daemon --stacktrace --warning-mode all assemble

      - name: Verify built artifact
        id: verify-artifact
        shell: bash
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_id="$(get_property mod_id)"
          artifact_name="$(get_property artifact_name)"
          variant_name="$(get_property variant_name)"
          jar_path="build/libs/$artifact_name"

          [[ -f "$jar_path" ]] || {
            echo "Expected jar not found: $jar_path" >&2
            echo "Actual jars:" >&2
            find build/libs -maxdepth 1 -type f -name '*.jar' -print >&2 || true
            exit 1
          }

          rm -rf build/ci-artifact-check
          mkdir -p build/ci-artifact-check
          (
            cd build/ci-artifact-check
            jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF META-INF/mods.toml pack.mcmeta
          )

          for required_entry in META-INF/MANIFEST.MF META-INF/mods.toml pack.mcmeta; do
            [[ -f "build/ci-artifact-check/$required_entry" ]] || {
              echo "Jar is missing required entry: $required_entry" >&2
              jar tf "$jar_path" >&2
              exit 1
            }
          done

          if grep -R '\${' build/ci-artifact-check; then
            echo "Jar metadata contains unexpanded template placeholders." >&2
            exit 1
          fi

          grep -F "modId=\"$mod_id\"" build/ci-artifact-check/META-INF/mods.toml >/dev/null || {
            echo "mods.toml inside jar does not contain expected modId=$mod_id." >&2
            exit 1
          }
          grep -F "GradleMC-Variant: $variant_name" build/ci-artifact-check/META-INF/MANIFEST.MF >/dev/null || {
            echo "Jar manifest does not contain expected GradleMC-Variant=$variant_name." >&2
            exit 1
          }

          echo "Verified artifact: $jar_path"
          echo "artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload built jar
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.verify-artifact.outputs.artifact-name }}
          path: ${{ env.PROJECT_DIR }}/build/libs/${{ steps.verify-artifact.outputs.artifact-name }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Gradle reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: forge-gradle-failure-reports
          path: |
            ${{ env.PROJECT_DIR }}/build/reports/**
            ${{ env.PROJECT_DIR }}/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  windows-wrapper:
    name: Windows wrapper and compile validation
    runs-on: windows-latest
    timeout-minutes: 35
    needs: repository-sanity
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle.kts
            GradleMC/Forge/Minecraft 1.20.1/gradle.properties
            GradleMC/Forge/Minecraft 1.20.1/gradle/wrapper/gradle-wrapper.properties

      - name: Validate Windows Gradle wrapper
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path '.\gradlew.bat')) {
            throw 'Missing gradlew.bat.'
          }
          if (-not (Test-Path '.\gradle\wrapper\gradle-wrapper.jar')) {
            throw 'Missing Gradle wrapper jar.'
          }

          $wrapperProperties = '.\gradle\wrapper\gradle-wrapper.properties'
          $timeoutLine = Select-String -Path $wrapperProperties -Pattern '^networkTimeout=([0-9]+)$' | Select-Object -First 1
          if (-not $timeoutLine) {
            throw 'Invalid or missing Gradle wrapper networkTimeout.'
          }
          $timeoutMs = [int]($timeoutLine.Matches[0].Groups[1].Value)
          if ($timeoutMs -lt 60000) {
            Write-Host "Bumping Gradle wrapper networkTimeout locally for CI: ${timeoutMs}ms -> 60000ms"
            (Get-Content $wrapperProperties) -replace '^networkTimeout=.*', 'networkTimeout=60000' | Set-Content $wrapperProperties
          }

          .\gradlew.bat --no-daemon --version

      - name: Compile and prepare self-tests on Windows
        run: |
          $ErrorActionPreference = 'Stop'
          .\gradlew.bat --no-daemon --stacktrace --warning-mode all compileJava testClasses

      - name: Upload Windows Gradle reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-gradle-failure-reports
          path: |
            ${{ env.PROJECT_DIR }}/build/reports/**
            ${{ env.PROJECT_DIR }}/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
