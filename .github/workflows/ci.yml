name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOD_PROJECT_DIR: "SOURCE CODE"
  PYTHON_VERSION: "3.12"
  PYTHONPATH: "${{ github.workspace }}/SOURCE CODE/tools/python"

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Validate repository layout
        shell: bash
        run: |
          set -euo pipefail

          echo "Project directory: $MOD_PROJECT_DIR"

          [[ -f LICENSE ]] || {
            echo "Missing LICENSE file. A public mod without a license is not mysterious; it is unusable." >&2
            exit 1
          }

          [[ ! -d "SOURCE CODEs" ]] || {
            echo "Stale source root found: SOURCE CODEs. Keep the canonical project under SOURCE CODE only." >&2
            exit 1
          }

          [[ -d "$MOD_PROJECT_DIR" ]] || {
            echo "Missing mod project directory: $MOD_PROJECT_DIR" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/gradlew" ]] || {
            echo "Missing Gradle wrapper script inside $MOD_PROJECT_DIR" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/build.gradle" || -f "$MOD_PROJECT_DIR/build.gradle.kts" ]] || {
            echo "Missing build.gradle/build.gradle.kts inside $MOD_PROJECT_DIR" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/settings.gradle" || -f "$MOD_PROJECT_DIR/settings.gradle.kts" ]] || {
            echo "Missing settings.gradle/settings.gradle.kts inside $MOD_PROJECT_DIR" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar" ]] || {
            echo "Missing Gradle wrapper jar inside $MOD_PROJECT_DIR/gradle/wrapper" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties" ]] || {
            echo "Missing Gradle wrapper properties inside $MOD_PROJECT_DIR/gradle/wrapper" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/tools/python/gradlemc_automation/__init__.py" ]] || {
            echo "Missing GradleMC Python automation package under $MOD_PROJECT_DIR/tools/python" >&2
            exit 1
          }

          [[ -f "$MOD_PROJECT_DIR/src/main/resources/META-INF/mods.toml" ]] || {
            echo "Missing Forge mods.toml metadata." >&2
            exit 1
          }

          java_source_count="$(find "$MOD_PROJECT_DIR/src/main/java" -type f -name '*.java' | wc -l | tr -d ' ')"
          if (( java_source_count == 0 )); then
            echo "No Java sources found under $MOD_PROJECT_DIR/src/main/java" >&2
            exit 1
          fi
          echo "Java source files: $java_source_count"

      - name: Validate mod metadata
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_id="$(get_property mod_id)"
          mod_version="$(get_property mod_version)"
          minecraft_version="$(get_property minecraft_version)"
          forge_version="$(get_property forge_version)"
          artifact_name="$(get_property artifact_name)"

          [[ "$mod_id" =~ ^[a-z][a-z0-9_]{1,63}$ ]] || {
            echo "Invalid mod_id '$mod_id'. Forge mod IDs must be lowercase and boring. Boring is good here." >&2
            exit 1
          }

          [[ -n "$mod_version" ]] || { echo "mod_version is empty." >&2; exit 1; }
          [[ -n "$minecraft_version" ]] || { echo "minecraft_version is empty." >&2; exit 1; }
          [[ -n "$forge_version" ]] || { echo "forge_version is empty." >&2; exit 1; }
          [[ -n "$artifact_name" ]] || { echo "artifact_name is empty." >&2; exit 1; }

          expected_artifact="${mod_id}-${mod_version}-forge-${minecraft_version}.jar"
          [[ "$artifact_name" == "$expected_artifact" ]] || {
            echo "artifact_name mismatch. Expected '$expected_artifact', got '$artifact_name'." >&2
            exit 1
          }

          echo "mod_id=$mod_id"
          echo "mod_version=$mod_version"
          echo "minecraft_version=$minecraft_version"
          echo "forge_version=$forge_version"
          echo "artifact_name=$artifact_name"

      - name: Check tracked junk and secrets
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f curseforge-description.html ]]; then
            test -s curseforge-description.html
          elif [[ -f curseforge-description ]]; then
            test -s curseforge-description
          else
            echo "::notice::No CurseForge description file found. Fine for code changes, bad for release prep."
          fi

          bad_files="$(find . -type f \( -path '*/build/*' -o -path '*/.gradle/*' -o -name '*.class' \) -print)"
          if [[ -n "$bad_files" ]]; then
            echo "Generated build files are committed. Delete them; CI should create them." >&2
            echo "$bad_files" >&2
            exit 1
          fi

          unexpected_jars=()
          while IFS= read -r jar; do
            case "$jar" in
              */gradle/wrapper/gradle-wrapper.jar|./Releases/*|*/libs/*.jar)
                echo "Allowed jar: $jar"
                ;;
              *)
                unexpected_jars+=("$jar")
                ;;
            esac
          done < <(find . -type f -name '*.jar' -print)

          if (( ${#unexpected_jars[@]} > 0 )); then
            echo "Unexpected committed jar files found:" >&2
            printf ' - %s\n' "${unexpected_jars[@]}" >&2
            echo "Keep wrapper jars, local dependency libs, and release jars only. Everything else belongs in CI artifacts." >&2
            exit 1
          fi

          if grep -RInIE --exclude-dir=.git --exclude-dir=build --exclude-dir=.gradle --exclude='*.jar' '(ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{30,}|sk-[A-Za-z0-9]{20,})' .; then
            echo "Possible token/secret found. Rotate it if real, then remove it from git." >&2
            exit 1
          fi

  gradle-build:
    name: Forge Gradle verification and build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: repository-sanity

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Validate automation imports
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: |
          set -euo pipefail
          python --version
          python - <<'PY'
          import importlib.util
          import sys

          required = [
              "gradlemc_automation.validate_variants",
              "gradlemc_automation.generate_github_matrix",
              "gradlemc_automation.check_claims",
              "gradlemc_automation.validate_release",
          ]
          missing = [name for name in required if importlib.util.find_spec(name) is None]
          if missing:
              print("Missing GradleMC automation modules:", ", ".join(missing), file=sys.stderr)
              sys.exit(1)
          print("GradleMC Python automation imports are healthy.")
          PY

      - name: Prepare and validate Gradle wrapper
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null
          grep -Eq '^distributionUrl=https\\://services\.gradle\.org/distributions/gradle-[0-9][^[:space:]]*-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          ./gradlew --version

      - name: Run verification checks
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: ./gradlew --no-daemon --stacktrace check

      - name: Build mod
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: ./gradlew --no-daemon --stacktrace assemble

      - name: Verify built jar name
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_id="$(get_property mod_id)"
          mod_version="$(get_property mod_version)"
          minecraft_version="$(get_property minecraft_version)"
          artifact_name="$(get_property artifact_name)"
          expected_jar="${mod_id}-${mod_version}-forge-${minecraft_version}.jar"

          [[ "$artifact_name" == "$expected_jar" ]] || {
            echo "artifact_name mismatch. Expected '$expected_jar', got '$artifact_name'." >&2
            exit 1
          }

          [[ -f "build/libs/$expected_jar" ]] || {
            echo "Expected jar not found: build/libs/$expected_jar" >&2
            echo "Actual jars:" >&2
            find build/libs -maxdepth 1 -type f -name '*.jar' -print >&2 || true
            exit 1
          }

          echo "EXPECTED_JAR=$expected_jar" >> "$GITHUB_ENV"

      - name: Write build summary
        shell: bash
        working-directory: ${{ env.MOD_PROJECT_DIR }}
        run: |
          {
            echo "### GradleMC CI"
            echo ""
            echo "- Project directory: \`$MOD_PROJECT_DIR\`"
            echo "- Python version: \`$PYTHON_VERSION\`"
            echo "- Expected jar: \`$EXPECTED_JAR\`"
            echo ""
            echo "Built jars:"
            find build/libs -maxdepth 1 -type f -name '*.jar' -printf '- `%p`\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload built jars
        uses: actions/upload-artifact@v7
        with:
          name: gradlemc-forge-1.20.1-jars
          path: ${{ env.MOD_PROJECT_DIR }}/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
