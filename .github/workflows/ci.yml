name: GradleMC CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: "SOURCE CODE"
  PYTHONPATH: "${{ github.workspace }}/SOURCE CODE/tools/python"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Validate repository layout
        shell: bash
        run: |
          set -euo pipefail

          [[ -f LICENSE ]] || { echo "Missing LICENSE." >&2; exit 1; }
          [[ -d ".github/workflows" ]] || { echo "Missing root GitHub workflows directory." >&2; exit 1; }
          [[ -f ".github/workflows/ci.yml" ]] || { echo "Missing root CI workflow." >&2; exit 1; }
          [[ -d "$PROJECT_DIR" ]] || { echo "Missing source directory: $PROJECT_DIR" >&2; exit 1; }
          [[ ! -d "SOURCE CODEs" ]] || { echo "Stale source root exists: SOURCE CODEs" >&2; exit 1; }
          [[ ! -d "$PROJECT_DIR/.github/workflows" ]] || {
            echo "Inactive nested workflows found under $PROJECT_DIR/.github/workflows." >&2
            echo "GitHub only runs workflows from the repository-root .github/workflows directory; keeping duplicates here is CI theater." >&2
            find "$PROJECT_DIR/.github/workflows" -maxdepth 1 -type f -print >&2 || true
            exit 1
          }
          [[ -f "$PROJECT_DIR/gradlew" ]] || { echo "Missing Gradle wrapper in $PROJECT_DIR" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/settings.gradle" || -f "$PROJECT_DIR/settings.gradle.kts" ]] || { echo "Missing Gradle settings in $PROJECT_DIR" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/build.gradle" || -f "$PROJECT_DIR/build.gradle.kts" ]] || { echo "Missing Gradle build file in $PROJECT_DIR" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar" ]] || { echo "Missing Gradle wrapper jar." >&2; exit 1; }
          [[ -f "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties" ]] || { echo "Missing Gradle wrapper properties." >&2; exit 1; }
          [[ -f "$PROJECT_DIR/tools/python/gradlemc_automation/__init__.py" ]] || { echo "Missing Python automation package." >&2; exit 1; }
          [[ -f "$PROJECT_DIR/src/main/resources/META-INF/mods.toml" ]] || { echo "Missing Forge mods.toml." >&2; exit 1; }

          java_source_count="$(find "$PROJECT_DIR/src/main/java" -type f -name '*.java' | wc -l | tr -d ' ')"
          if (( java_source_count == 0 )); then
            echo "No Java sources found under $PROJECT_DIR/src/main/java" >&2
            exit 1
          fi
          echo "Java source files: $java_source_count"

      - name: Validate release identity
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_id="$(get_property mod_id)"
          mod_version="$(get_property mod_version)"
          minecraft_version="$(get_property minecraft_version)"
          forge_version="$(get_property forge_version)"
          artifact_name="$(get_property artifact_name)"
          expected_artifact="${mod_id}-${mod_version}-forge-${minecraft_version}.jar"

          [[ "$mod_id" =~ ^[a-z][a-z0-9_]{1,63}$ ]] || { echo "Invalid mod_id: $mod_id" >&2; exit 1; }
          [[ -n "$mod_version" ]] || { echo "mod_version is empty." >&2; exit 1; }
          [[ -n "$minecraft_version" ]] || { echo "minecraft_version is empty." >&2; exit 1; }
          [[ -n "$forge_version" ]] || { echo "forge_version is empty." >&2; exit 1; }
          [[ "$artifact_name" == "$expected_artifact" ]] || {
            echo "artifact_name mismatch. Expected '$expected_artifact', got '$artifact_name'." >&2
            exit 1
          }

          echo "mod_id=$mod_id"
          echo "mod_version=$mod_version"
          echo "minecraft_version=$minecraft_version"
          echo "forge_version=$forge_version"
          echo "artifact_name=$artifact_name"

      - name: Check tracked junk and secrets
        shell: bash
        run: |
          set -euo pipefail

          bad_files="$(find . -type f \( -path '*/build/*' -o -path '*/.gradle/*' -o -name '*.class' \) -print)"
          if [[ -n "$bad_files" ]]; then
            echo "Generated build files are committed. Delete them; CI should create them." >&2
            echo "$bad_files" >&2
            exit 1
          fi

          unexpected_jars=()
          while IFS= read -r jar; do
            case "$jar" in
              */gradle/wrapper/gradle-wrapper.jar|./Releases/*|*/libs/*.jar)
                echo "Allowed jar: $jar"
                ;;
              *)
                unexpected_jars+=("$jar")
                ;;
            esac
          done < <(find . -type f -name '*.jar' -print)

          if (( ${#unexpected_jars[@]} > 0 )); then
            echo "Unexpected committed jar files found:" >&2
            printf ' - %s\n' "${unexpected_jars[@]}" >&2
            exit 1
          fi

          if grep -RInIE --exclude-dir=.git --exclude-dir=build --exclude-dir=.gradle --exclude='*.jar' '(ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{30,}|sk-[A-Za-z0-9]{20,})' .; then
            echo "Possible token/secret found." >&2
            exit 1
          fi

  python-automation:
    name: Python automation ${{ matrix.python }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: repository-sanity
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.12"
          - "3.13"
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Run Python automation checks
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m gradlemc_automation.validate_variants
          python -m gradlemc_automation.generate_github_matrix --output build/generated/gradlemc/github-matrix.json
          python -m gradlemc_automation.generate_docs_tables
          python -m gradlemc_automation.check_claims --identity
          python -m gradlemc_automation.check_claims --false-support
          python -m gradlemc_automation.check_command_casing
          python -m gradlemc_automation.validate_release
          python -m unittest discover -s tools/python/tests

      - name: Verify generated docs are checked in
        shell: bash
        run: |
          set -euo pipefail
          python -m gradlemc_automation.generate_docs_tables --update-docs
          if ! git diff --exit-code -- docs/PORTING_MATRIX.md; then
            echo "Generated variant docs are stale. Run python -m gradlemc_automation.generate_docs_tables --update-docs and commit the result." >&2
            exit 1
          fi

      - name: Upload Python automation reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: python-automation-${{ matrix.python }}-reports
          path: |
            ${{ env.PROJECT_DIR }}/build/generated/gradlemc/**
            ${{ env.PROJECT_DIR }}/build/reports/gradlemc/**
          if-no-files-found: ignore
          retention-days: 7

  forge-build:
    name: Forge 1.20.1 verification and build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: repository-sanity
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            SOURCE CODE/**/*.gradle
            SOURCE CODE/**/*.gradle.kts
            SOURCE CODE/gradle.properties
            SOURCE CODE/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null
          distribution_url="$(sed -n 's/^distributionUrl=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          [[ "$distribution_url" == https\\://services.gradle.org/distributions/gradle-*-bin.zip ]] || {
            echo "Unexpected Gradle wrapper distributionUrl: $distribution_url" >&2
            exit 1
          }
          timeout_ms="$(sed -n 's/^networkTimeout=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          [[ "$timeout_ms" =~ ^[0-9]+$ ]] || { echo "Invalid Gradle wrapper networkTimeout: $timeout_ms" >&2; exit 1; }
          if (( timeout_ms < 60000 )); then
            echo "Gradle wrapper networkTimeout is too low for CI: ${timeout_ms}ms" >&2
            exit 1
          fi
          ./gradlew --no-daemon --version

      - name: Run Gradle verification
        shell: bash
        run: ./gradlew --no-daemon --stacktrace check

      - name: Build mod jar
        shell: bash
        run: ./gradlew --no-daemon --stacktrace assemble

      - name: Export release jar
        shell: bash
        run: ./gradlew --no-daemon --stacktrace exportReleaseJar

      - name: Verify built artifact
        shell: bash
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          artifact_name="$(get_property artifact_name)"
          [[ -f "build/libs/$artifact_name" ]] || {
            echo "Expected jar not found: build/libs/$artifact_name" >&2
            echo "Actual jars:" >&2
            find build/libs -maxdepth 1 -type f -name '*.jar' -print >&2 || true
            exit 1
          }
          [[ -f "build/exports/$artifact_name" ]] || {
            echo "Expected exported jar not found: build/exports/$artifact_name" >&2
            find build/exports -maxdepth 1 -type f -name '*.jar' -print >&2 || true
            exit 1
          }

          echo "Built artifact: build/libs/$artifact_name"
          echo "Exported artifact: build/exports/$artifact_name"
          echo "ARTIFACT_NAME=$artifact_name" >> "$GITHUB_ENV"

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PROJECT_DIR }}/build/libs/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Gradle reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: forge-gradle-failure-reports
          path: |
            ${{ env.PROJECT_DIR }}/build/reports/**
            ${{ env.PROJECT_DIR }}/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  node-tooling:
    name: Node tooling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: repository-sanity
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Validate Node manifests
        shell: bash
        run: |
          set -euo pipefail
          [[ -f package.json ]] || { echo "Missing package.json for Node tooling." >&2; exit 1; }
          [[ -f package-lock.json ]] || { echo "Missing package-lock.json for reproducible Node installs." >&2; exit 1; }

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: "SOURCE CODE/package-lock.json"

      - name: Validate Node package identity
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name || ''")"
          [[ "$package_name" == "gradlemc-automation" ]] || {
            echo "Unexpected Node package name: $package_name" >&2
            exit 1
          }

      - name: Run Node checks
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run check
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.typecheck ? 0 : 1)"; then
            npm run typecheck
          fi

      - name: Upload Node reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: node-tooling-failure-reports
          path: ${{ env.PROJECT_DIR }}/build/reports/gradlemc/**
          if-no-files-found: ignore
          retention-days: 7

  powershell-wrapper:
    name: PowerShell wrapper validation
    runs-on: windows-latest
    timeout-minutes: 20
    needs: repository-sanity
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            SOURCE CODE/**/*.gradle
            SOURCE CODE/**/*.gradle.kts
            SOURCE CODE/gradle.properties
            SOURCE CODE/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: "SOURCE CODE/package-lock.json"

      - name: Run PowerShell validation wrapper
        shell: pwsh
        run: pwsh ./tools/pwsh/validate.ps1

      - name: Upload PowerShell validation reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: powershell-wrapper-failure-reports
          path: |
            ${{ env.PROJECT_DIR }}/build/reports/**
            ${{ env.PROJECT_DIR }}/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
