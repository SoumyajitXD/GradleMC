name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Run repository checks
        shell: bash
        run: |
          set -euo pipefail

          test -f LICENSE

          if [[ -f curseforge-description.html ]]; then
            test -s curseforge-description.html
          elif [[ -f curseforge-description ]]; then
            test -s curseforge-description
          else
            echo "::notice::No CurseForge description file found. That is fine for code-only changes, but keep release text tracked before publishing."
          fi

          bad_files="$(find . -type f \( -path '*/build/*' -o -path '*/.gradle/*' -o -name '*.class' \) -print)"
          if [[ -n "$bad_files" ]]; then
            echo "Generated build files are committed. Delete them; CI should create them, not babysit them."
            echo "$bad_files"
            exit 1
          fi

          committed_jars="$(find . -type f -name '*.jar' ! -path './gradle/wrapper/gradle-wrapper.jar' -print)"
          if [[ -n "$committed_jars" ]]; then
            echo "Jar files are committed outside the Gradle wrapper. Ship jars through releases/artifacts, not source control."
            echo "$committed_jars"
            exit 1
          fi

          if grep -RInIE '(ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{30,}|sk-[A-Za-z0-9]{20,})' . --exclude-dir=.git; then
            echo "Possible token/secret found. Rotate it if real, then remove it from git."
            exit 1
          fi

  gradle-build:
    name: Gradle build
    runs-on: ubuntu-latest
    needs: repository-sanity

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Detect Gradle project
        id: gradle
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f gradlew && ( -f build.gradle || -f build.gradle.kts || -f settings.gradle || -f settings.gradle.kts ) ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Gradle wrapper/build files found, so the build is skipped. Push the mod source and Gradle wrapper to enable compilation."
          fi

      - name: Set up Java 17
        if: steps.gradle.outputs.found == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.gradle.outputs.found == 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Make Gradle wrapper executable
        if: steps.gradle.outputs.found == 'true'
        shell: bash
        run: chmod +x ./gradlew

      - name: Build with Gradle
        if: steps.gradle.outputs.found == 'true'
        shell: bash
        run: ./gradlew --no-daemon clean build

      - name: Upload built jars
        if: steps.gradle.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: gradlemc-jars
          path: |
            build/libs/*.jar
            */build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
