name: GradleMC CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.warning.mode=all"

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Validate repository layout
        shell: bash
        run: |
          set -euo pipefail

          [[ -f LICENSE ]] || { echo "Missing LICENSE." >&2; exit 1; }
          [[ -f README.md ]] || { echo "Missing README.md." >&2; exit 1; }
          [[ -f CHANGELOG.md ]] || { echo "Missing CHANGELOG.md." >&2; exit 1; }
          [[ -f ROADMAP.md ]] || { echo "Missing ROADMAP.md." >&2; exit 1; }
          [[ -f SUPPORT.md ]] || { echo "Missing SUPPORT.md." >&2; exit 1; }
          [[ -f SECURITY.md ]] || { echo "Missing SECURITY.md." >&2; exit 1; }
          [[ -f CONTRIBUTING.md ]] || { echo "Missing CONTRIBUTING.md." >&2; exit 1; }
          [[ -f AGENTS.md ]] || { echo "Missing AGENTS.md." >&2; exit 1; }
          [[ -f curseforge-description.html ]] || { echo "Missing curseforge-description.html." >&2; exit 1; }
          [[ -d ".github/workflows" ]] || { echo "Missing root GitHub workflows directory." >&2; exit 1; }
          [[ -f ".github/workflows/ci.yml" ]] || { echo "Missing root CI workflow." >&2; exit 1; }

          supported_projects=(
            "GradleMC/Forge/Minecraft 1.21.11"
            "GradleMC/Forge/Minecraft 26.1.2"
            "GradleMC/Forge/Minecraft 1.20.1"
            "GradleMC/Fabric/Minecraft 1.21.11"
            "GradleMC/Fabric/Minecraft 26.1.2"
            "GradleMC/Fabric/Minecraft 1.20.1"
            "GradleMC/NeoForge/Minecraft 1.21.11"
            "GradleMC/NeoForge/Minecraft 26.1.2"
            "GradleMC/Quilt/Minecraft 1.20.1"
          )

          declare -A supported_project_lookup=()
          for project_dir in "${supported_projects[@]}"; do
            supported_project_lookup["$project_dir"]=1
            [[ -d "$project_dir" ]] || { echo "Missing source directory: $project_dir" >&2; exit 1; }
            [[ -f "$project_dir/gradlew" ]] || { echo "Missing Gradle wrapper shell script: $project_dir/gradlew" >&2; exit 1; }
            [[ -f "$project_dir/gradlew.bat" ]] || { echo "Missing Gradle wrapper batch script: $project_dir/gradlew.bat" >&2; exit 1; }
            [[ -f "$project_dir/settings.gradle" || -f "$project_dir/settings.gradle.kts" ]] || { echo "Missing Gradle settings file in $project_dir" >&2; exit 1; }
            [[ -f "$project_dir/build.gradle" || -f "$project_dir/build.gradle.kts" ]] || { echo "Missing Gradle build file in $project_dir" >&2; exit 1; }
            [[ -f "$project_dir/gradle.properties" ]] || { echo "Missing gradle.properties in $project_dir" >&2; exit 1; }
            [[ -f "$project_dir/gradle/wrapper/gradle-wrapper.jar" ]] || { echo "Missing Gradle wrapper jar in $project_dir" >&2; exit 1; }
            [[ -f "$project_dir/gradle/wrapper/gradle-wrapper.properties" ]] || { echo "Missing Gradle wrapper properties in $project_dir" >&2; exit 1; }
          done

          mapfile -d '' discovered_project_properties < <(find GradleMC -path 'GradleMC/*/Minecraft */gradle.properties' -type f -print0 | sort -z)
          [[ ${#discovered_project_properties[@]} -gt 0 ]] || { echo "No GradleMC source projects discovered." >&2; exit 1; }
          for project_properties in "${discovered_project_properties[@]}"; do
            discovered_project="${project_properties%/gradle.properties}"
            if [[ -z "${supported_project_lookup[$discovered_project]+x}" ]]; then
              echo "Source project exists but is not covered by CI: $discovered_project" >&2
              exit 1
            fi
          done

          for stale_root in "SOURCE CODE" "SOURCE CODEs"; do
            if [[ -e "$stale_root" ]]; then
              echo "Stale source root exists: $stale_root" >&2
              exit 1
            fi
          done

          nested_workflows="$(find GradleMC -path '*/.github/workflows' -type d -print || true)"
          if [[ -n "$nested_workflows" ]]; then
            echo "Inactive nested workflows found below GradleMC. GitHub only runs workflows from the repository-root .github/workflows directory." >&2
            echo "$nested_workflows" >&2
            exit 1
          fi

      - name: Validate screenshot documentation
        shell: bash
        run: |
          set -euo pipefail

          [[ -d Screenshots ]] || { echo "Missing Screenshots directory." >&2; exit 1; }
          [[ -f docs/SCREENSHOTS.md ]] || { echo "Missing docs/SCREENSHOTS.md." >&2; exit 1; }
          [[ -f docs/SCREENSHOT_PLAN.md ]] || { echo "Missing docs/SCREENSHOT_PLAN.md." >&2; exit 1; }

          for screenshot_id in {0..13}; do
            screenshot="Screenshots/${screenshot_id}.png"
            [[ -f "$screenshot" ]] || { echo "Missing screenshot: $screenshot" >&2; exit 1; }
          done

          grep -F 'Screenshots/0.png' README.md >/dev/null || {
            echo "README.md does not reference the main screenshot preview." >&2
            exit 1
          }
          grep -F '../Screenshots/13.png' docs/SCREENSHOTS.md >/dev/null || {
            echo "docs/SCREENSHOTS.md does not reference the complete screenshot set." >&2
            exit 1
          }

      - name: Validate public release surface
        shell: bash
        run: |
          set -euo pipefail

          required_artifacts=(
            "gradlemc-forge-26.1.2-1.0.0.jar"
            "gradlemc-1.0.2-forge-1.20.1.jar"
            "gradlemc-fabric-26.1.2-1.0.0.jar"
            "gradlemc-fabric-1.20.1-1.0.0.jar"
            "gradlemc-quilt-1.20.1-1.0.0.jar"
          )

          release_docs=(
            README.md
            CHANGELOG.md
            ROADMAP.md
            SUPPORT.md
            SECURITY.md
            CONTRIBUTING.md
            AGENTS.md
            docs/RELEASE_CHECKLIST.md
            curseforge-description.html
          )

          for artifact in "${required_artifacts[@]}"; do
            for doc in README.md CHANGELOG.md docs/RELEASE_CHECKLIST.md curseforge-description.html; do
              grep -F "$artifact" "$doc" >/dev/null || {
                echo "$doc does not mention required artifact: $artifact" >&2
                exit 1
              }
            done
          done

          for doc in "${release_docs[@]}"; do
            if ! grep -F 'Forge' "$doc" >/dev/null || ! grep -F '26.1.2' "$doc" >/dev/null; then
              echo "$doc does not mention Forge and 26.1.2 support." >&2
              exit 1
            fi
          done

          grep -F 'Bedrock' README.md >/dev/null || {
            echo "README.md must keep unsupported platform guardrails visible." >&2
            exit 1
          }
          grep -F 'any loader/version pair not listed in the supported release table' README.md >/dev/null || {
            echo "README.md must keep unsupported loader/version guardrails visible." >&2
            exit 1
          }
          grep -F '| Telemetry | None |' README.md >/dev/null || {
            echo "README.md must keep privacy guardrails visible." >&2
            exit 1
          }

      - name: Check tracked junk and sensitive text
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' tracked_files < <(git ls-files -z)

          bad_files=()
          approved_jars=()
          unexpected_jars=()
          for tracked_file in "${tracked_files[@]}"; do
            case "$tracked_file" in
              */build/*|*/.gradle/*|*.class|*.tmp|*.bak)
                bad_files+=("$tracked_file")
                ;;
            esac
            case "$tracked_file" in
              */gradle/wrapper/gradle-wrapper.jar)
                ;;
              Releases/Forge/Minecraft\ 26.1.2/gradlemc-forge-26.1.2-1.0.0.jar|Releases/Forge/Minecraft\ 1.20.1/gradlemc-1.0.2-forge-1.20.1.jar|Releases/Fabric/Minecraft\ 26.1.2/gradlemc-fabric-26.1.2-1.0.0.jar|Releases/Fabric/Minecraft\ 1.20.1/gradlemc-fabric-1.20.1-1.0.0.jar|Releases/Quilt/Minecraft\ 1.20.1/gradlemc-quilt-1.20.1-1.0.0.jar)
                approved_jars+=("$tracked_file")
                ;;
              *.jar)
                unexpected_jars+=("$tracked_file")
                ;;
            esac
          done

          if (( ${#bad_files[@]} > 0 )); then
            echo "Generated or junk files are tracked. Delete them; CI should create them." >&2
            printf ' - %s\n' "${bad_files[@]}" >&2
            exit 1
          fi

          if (( ${#unexpected_jars[@]} > 0 )); then
            echo "Unexpected committed jar files found. Only Gradle wrapper jars and approved release artifacts under Releases/ are allowed:" >&2
            printf ' - %s\n' "${unexpected_jars[@]}" >&2
            exit 1
          fi

          if (( ${#approved_jars[@]} > 0 )); then
            echo "Approved release jar artifacts:"
            printf ' - %s\n' "${approved_jars[@]}"
          fi

          pat_a='ghp_[A-Za-z0-9_]{30,}'
          pat_b='github_pat_[A-Za-z0-9_]{30,}'
          pat_c='s''k-[A-Za-z0-9]{20,}'
          sensitive_pattern="(${pat_a}|${pat_b}|${pat_c})"
          if git grep -IInE "$sensitive_pattern" -- . ':(exclude)*.png' ':(exclude)*.jpg' ':(exclude)*.jpeg' ':(exclude)*.webp' ':(exclude)*.gif' ':(exclude)*.jar'; then
            echo "Possible sensitive value found in tracked text." >&2
            exit 1
          fi

  build-supported-port:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: repository-sanity
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Forge 1.21.11
            project_dir: GradleMC/Forge/Minecraft 1.21.11
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
            expected_artifact: gradlemc-forge-1.21.11-1.0.0.jar
            metadata_kind: forge
          - name: Forge 26.1.2
            project_dir: GradleMC/Forge/Minecraft 26.1.2
            java: "25"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            expected_artifact: gradlemc-forge-26.1.2-1.0.0.jar
            metadata_kind: forge
          - name: Forge 1.20.1
            project_dir: GradleMC/Forge/Minecraft 1.20.1
            java: "17"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
            expected_artifact: gradlemc-1.0.2-forge-1.20.1.jar
            metadata_kind: forge
          - name: Fabric 1.21.11
            project_dir: GradleMC/Fabric/Minecraft 1.21.11
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            expected_artifact: gradlemc-fabric-1.21.11-1.0.0.jar
            metadata_kind: fabric
          - name: Fabric 26.1.2
            project_dir: GradleMC/Fabric/Minecraft 26.1.2
            java: "25"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            expected_artifact: gradlemc-fabric-26.1.2-1.0.0.jar
            metadata_kind: fabric
          - name: Fabric 1.20.1
            project_dir: GradleMC/Fabric/Minecraft 1.20.1
            java: "17"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            expected_artifact: gradlemc-fabric-1.20.1-1.0.0.jar
            metadata_kind: fabric
          - name: NeoForge 1.21.11
            project_dir: GradleMC/NeoForge/Minecraft 1.21.11
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
            expected_artifact: gradlemc-neoforge-1.21.11-1.0.0.jar
            metadata_kind: neoforge
          - name: NeoForge 26.1.2
            project_dir: GradleMC/NeoForge/Minecraft 26.1.2
            java: "25"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            expected_artifact: gradlemc-neoforge-26.1.2-1.0.0.jar
            metadata_kind: neoforge
          - name: Quilt 1.20.1
            project_dir: GradleMC/Quilt/Minecraft 1.20.1
            java: "17"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            expected_artifact: gradlemc-quilt-1.20.1-1.0.0.jar
            metadata_kind: quilt
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
          cache-dependency-path: |
            ${{ matrix.project_dir }}/**/*.gradle
            ${{ matrix.project_dir }}/**/*.gradle.kts
            ${{ matrix.project_dir }}/gradle.properties
            ${{ matrix.project_dir }}/gradle/wrapper/gradle-wrapper.properties

      - name: Prepare Gradle wrapper
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null

          if grep -q '^org.gradle.java.home=' gradle.properties; then
            echo "Removing local developer org.gradle.java.home from gradle.properties for CI. The setup-java toolchain is the source of truth here."
            sed -i '/^org.gradle.java.home=/d' gradle.properties
          fi

          distribution_url="$(sed -n 's/^distributionUrl=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          distribution_url="${distribution_url//\\:/:}"
          [[ "$distribution_url" == https://services.gradle.org/distributions/gradle-*-bin.zip ]] || {
            echo "Unexpected Gradle wrapper distributionUrl: $distribution_url" >&2
            exit 1
          }

          timeout_ms="$(sed -n 's/^networkTimeout=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          if [[ -z "$timeout_ms" ]]; then
            echo "networkTimeout=60000" >> gradle/wrapper/gradle-wrapper.properties
          elif [[ "$timeout_ms" =~ ^[0-9]+$ ]] && (( timeout_ms < 60000 )); then
            echo "Bumping Gradle wrapper networkTimeout locally for CI: ${timeout_ms}ms -> 60000ms"
            sed -i 's/^networkTimeout=.*/networkTimeout=60000/' gradle/wrapper/gradle-wrapper.properties
          elif [[ ! "$timeout_ms" =~ ^[0-9]+$ ]]; then
            echo "Invalid Gradle wrapper networkTimeout: $timeout_ms" >&2
            exit 1
          fi

          ./gradlew --no-daemon --version

      - name: Validate source metadata
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_version="$(get_property mod_version)"
          minecraft_version="$(get_property minecraft_version)"
          [[ -n "$mod_version" ]] || { echo "mod_version is empty." >&2; exit 1; }
          [[ -n "$minecraft_version" ]] || { echo "minecraft_version is empty." >&2; exit 1; }

          case "${{ matrix.metadata_kind }}" in
            forge|neoforge)
              mod_id="$(get_property mod_id)"
              loader_name="$(get_property loader_name)"
              variant_name="$(get_property variant_name)"
              artifact_name="$(get_property artifact_name)"
              [[ "$mod_id" == "gradlemc" ]] || { echo "Unexpected ${{ matrix.metadata_kind }} mod_id: $mod_id" >&2; exit 1; }
              if [[ "${{ matrix.metadata_kind }}" == "forge" ]]; then
                [[ "$loader_name" == "forge" || "$loader_name" == "Forge" ]] || { echo "Unexpected Forge loader_name: $loader_name" >&2; exit 1; }
              else
                [[ "$loader_name" == "neoforge" || "$loader_name" == "NeoForge" ]] || { echo "Unexpected NeoForge loader_name: $loader_name" >&2; exit 1; }
              fi
              [[ "$variant_name" == "${{ matrix.metadata_kind }}-$minecraft_version" ]] || { echo "Unexpected ${{ matrix.metadata_kind }} variant_name: $variant_name" >&2; exit 1; }
              [[ "$artifact_name" == "${{ matrix.expected_artifact }}" ]] || { echo "Unexpected ${{ matrix.metadata_kind }} artifact_name: $artifact_name" >&2; exit 1; }
              ;;
            fabric|quilt)
              archives_base_name="$(get_property archives_base_name)"
              artifact_name="${archives_base_name}-${mod_version}.jar"
              [[ "$artifact_name" == "${{ matrix.expected_artifact }}" ]] || { echo "Unexpected ${{ matrix.metadata_kind }} artifact: $artifact_name" >&2; exit 1; }
              ;;
            *)
              echo "Unknown metadata kind: ${{ matrix.metadata_kind }}" >&2
              exit 1
              ;;
          esac

          echo "minecraft_version=$minecraft_version"
          echo "mod_version=$mod_version"
          echo "expected_artifact=${{ matrix.expected_artifact }}"

      - name: Build and verify
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: ${{ matrix.command }}

      - name: Verify built artifact
        id: verify-artifact
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -euo pipefail

          artifact_name="${{ matrix.expected_artifact }}"
          jar_path="build/libs/$artifact_name"

          [[ -f "$jar_path" ]] || {
            echo "Expected jar not found: $jar_path" >&2
            echo "Actual jars:" >&2
            find build/libs -maxdepth 1 -type f -name '*.jar' -print >&2 || true
            exit 1
          }

          jar tf "$jar_path" >/dev/null
          mkdir -p build/ci-artifact-check

          case "${{ matrix.metadata_kind }}" in
            forge)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF META-INF/mods.toml pack.mcmeta)
              for required_entry in META-INF/MANIFEST.MF META-INF/mods.toml pack.mcmeta; do
                [[ -f "build/ci-artifact-check/$required_entry" ]] || { echo "Jar is missing required Forge entry: $required_entry" >&2; exit 1; }
              done
              grep -F 'modId="gradlemc"' build/ci-artifact-check/META-INF/mods.toml >/dev/null || {
                echo "mods.toml inside jar does not contain modId=gradlemc." >&2
                exit 1
              }
              ;;
            neoforge)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF META-INF/neoforge.mods.toml pack.mcmeta)
              for required_entry in META-INF/MANIFEST.MF META-INF/neoforge.mods.toml pack.mcmeta; do
                [[ -f "build/ci-artifact-check/$required_entry" ]] || { echo "Jar is missing required NeoForge entry: $required_entry" >&2; exit 1; }
              done
              grep -F 'modId="gradlemc"' build/ci-artifact-check/META-INF/neoforge.mods.toml >/dev/null || {
                echo "neoforge.mods.toml inside jar does not contain modId=gradlemc." >&2
                exit 1
              }
              ;;
            fabric)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF fabric.mod.json)
              [[ -f build/ci-artifact-check/fabric.mod.json ]] || { echo "Jar is missing fabric.mod.json." >&2; exit 1; }
              grep -F '"id": "gradlemc"' build/ci-artifact-check/fabric.mod.json >/dev/null || {
                echo "fabric.mod.json inside jar does not contain id=gradlemc." >&2
                exit 1
              }
              ;;
            quilt)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF quilt.mod.json)
              [[ -f build/ci-artifact-check/quilt.mod.json ]] || { echo "Jar is missing quilt.mod.json." >&2; exit 1; }
              grep -F '"id": "gradlemc"' build/ci-artifact-check/quilt.mod.json >/dev/null || {
                echo "quilt.mod.json inside jar does not contain id=gradlemc." >&2
                exit 1
              }
              ;;
          esac

          if grep -R '\${' build/ci-artifact-check; then
            echo "Jar metadata contains unexpanded template placeholders." >&2
            exit 1
          fi

          echo "Verified artifact: $jar_path"
          echo "artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload built jar
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.verify-artifact.outputs.artifact-name }}
          path: ${{ matrix.project_dir }}/build/libs/${{ steps.verify-artifact.outputs.artifact-name }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Gradle reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: gradle-failure-reports-${{ matrix.name }}
          path: |
            ${{ matrix.project_dir }}/build/reports/**
            ${{ matrix.project_dir }}/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
