name: GradleMC CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant id to build, or all for enabled variants"
        required: false
        default: "forge-1.20.1"
      includePlanned:
        description: "Include planned variants in generated matrix"
        required: false
        default: false
        type: boolean
      includeExperimental:
        description: "Include experimental variants in generated matrix"
        required: false
        default: false
        type: boolean
      pythonVersion:
        description: "Python version for automation validation"
        required: false
        default: "3.12"
      nodeVersion:
        description: "Node version if Node tooling exists"
        required: false
        default: "22"
      runPowerShellChecks:
        description: "Run PowerShell wrapper checks"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  automation-validation:
    name: Automation validation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.pythonVersion || '3.12' }}
      - name: Setup Node only when package.json exists
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event_name == 'workflow_dispatch' && inputs.nodeVersion || '22' }}
          cache: npm
      - name: Check automation tools
        run: ./gradlew checkAutomationTools
      - name: Validate matrix and project checks
        run: ./gradlew validateVariantMatrix checkProjectIdentity checkCommandCasing checkFalseSupportClaims checkReleaseMetadata
      - name: Generate GitHub matrix
        id: matrix
        shell: bash
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.includePlanned }}" == "true" ]]; then
              args+=(--include-planned)
            fi
            if [[ "${{ inputs.includeExperimental }}" == "true" ]]; then
              args+=(--include-experimental)
            fi
            if [[ -n "${{ inputs.variant }}" && "${{ inputs.variant }}" != "all" ]]; then
              args+=(--only-variant "${{ inputs.variant }}")
            fi
          fi
          python -m gradlemc_automation.generate_github_matrix "${args[@]}" --output build/generated/gradlemc/github-matrix.json
          matrix="$(tr -d '\n' < build/generated/gradlemc/github-matrix.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-enabled-variants:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: automation-validation
    if: ${{ needs.automation-validation.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.automation-validation.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Build selected variant
        run: ./gradlew buildVariant -PgradlemcVariant=${{ matrix.variant }}
      - name: Upload real build artifact
        if: ${{ success() && matrix.buildable }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: build/libs/${{ matrix.artifactName }}
          if-no-files-found: error

  python-tooling-test:
    name: Python tooling ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run Python automation tests
        run: |
          python -m gradlemc_automation.validate_variants
          python -m gradlemc_automation.generate_github_matrix
          python -m gradlemc_automation.generate_docs_tables
          python -m gradlemc_automation.check_claims
          python -m gradlemc_automation.check_command_casing
          python -m gradlemc_automation.validate_release
          python -m unittest discover -s tools/python/tests

  node-tooling-test:
    name: Node tooling
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event_name == 'workflow_dispatch' && inputs.nodeVersion || '22' }}
          cache: npm
      - name: Run Node checks
        run: |
          npm ci
          npm run check
          if npm run | grep -q "typecheck"; then
            npm run typecheck
          fi

  powershell-wrapper-test:
    name: PowerShell wrappers
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runPowerShellChecks }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check environment
        shell: pwsh
        run: pwsh ./tools/pwsh/check-env.ps1
      - name: Run validation wrapper
        shell: pwsh
        run: pwsh ./tools/pwsh/validate.ps1
