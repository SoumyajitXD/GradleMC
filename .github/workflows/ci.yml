name: GradleMC CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.warning.mode=all"

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Diagnostic guardrail only. The build matrix is the blocking verification.
    continue-on-error: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Report repository layout
        shell: bash
        run: |
          set -u

          missing=0
          warn_missing_file() {
            local path="$1"
            if [[ ! -f "$path" ]]; then
              echo "::warning title=Missing expected file::$path"
              missing=1
            fi
          }
          warn_missing_dir() {
            local path="$1"
            if [[ ! -d "$path" ]]; then
              echo "::warning title=Missing expected directory::$path"
              missing=1
            fi
          }

          root_files=(
            LICENSE
            README.md
            CHANGELOG.md
            ROADMAP.md
            SUPPORT.md
            SECURITY.md
            CONTRIBUTING.md
            AGENTS.md
            curseforge-description.html
            .github/workflows/ci.yml
            docs/SCREENSHOTS.md
            docs/SCREENSHOT_PLAN.md
          )

          for file in "${root_files[@]}"; do
            warn_missing_file "$file"
          done
          warn_missing_dir Screenshots

          expected_projects=(
            "GradleMC/Forge/Minecraft 1.21.11"
            "GradleMC/Forge/Minecraft 26.1.2"
            "GradleMC/Forge/Minecraft 1.20.1"
            "GradleMC/Fabric/Minecraft 1.21.11"
            "GradleMC/Fabric/Minecraft 26.1.2"
            "GradleMC/Fabric/Minecraft 1.20.1"
            "GradleMC/NeoForge/Minecraft 1.21.11"
            "GradleMC/NeoForge/Minecraft 26.1.2"
            "GradleMC/Quilt/Minecraft 1.20.1"
          )

          for project_dir in "${expected_projects[@]}"; do
            warn_missing_dir "$project_dir"
            warn_missing_file "$project_dir/gradlew"
            warn_missing_file "$project_dir/gradlew.bat"
            if [[ ! -f "$project_dir/settings.gradle" && ! -f "$project_dir/settings.gradle.kts" ]]; then
              echo "::warning title=Missing Gradle settings::$project_dir"
              missing=1
            fi
            if [[ ! -f "$project_dir/build.gradle" && ! -f "$project_dir/build.gradle.kts" ]]; then
              echo "::warning title=Missing Gradle build file::$project_dir"
              missing=1
            fi
            warn_missing_file "$project_dir/gradle.properties"
            warn_missing_file "$project_dir/gradle/wrapper/gradle-wrapper.jar"
            warn_missing_file "$project_dir/gradle/wrapper/gradle-wrapper.properties"
          done

          echo "Discovered GradleMC source projects:"
          find GradleMC -path 'GradleMC/*/Minecraft */gradle.properties' -type f -print \
            | sed 's#/gradle.properties$##' \
            | sort || true

          nested_workflows="$(find GradleMC -path '*/.github/workflows' -type d -print || true)"
          if [[ -n "$nested_workflows" ]]; then
            echo "::warning title=Inactive nested workflows::GitHub only runs workflows from repository-root .github/workflows. Found:"
            echo "$nested_workflows"
          fi

          for stale_root in "SOURCE CODE" "SOURCE CODEs"; do
            if [[ -e "$stale_root" ]]; then
              echo "::warning title=Stale source root::$stale_root"
              missing=1
            fi
          done

          if (( missing != 0 )); then
            echo "Repository inventory reported warnings. Build verification still runs and remains blocking."
          else
            echo "Repository inventory passed."
          fi

      - name: Report public release surface
        shell: bash
        run: |
          set -u
          required_artifacts=(
            "gradlemc-forge-26.1.2-1.0.0.jar"
            "gradlemc-1.0.3-forge-1.20.1.jar"
            "gradlemc-1.0.2-forge-1.20.1.jar"
            "gradlemc-fabric-26.1.2-1.0.0.jar"
            "gradlemc-fabric-1.20.1-1.0.0.jar"
            "gradlemc-quilt-1.20.1-1.0.0.jar"
          )

          for artifact in "${required_artifacts[@]}"; do
            if ! git grep -F "$artifact" -- README.md CHANGELOG.md docs/RELEASE_CHECKLIST.md curseforge-description.html >/dev/null; then
              echo "::warning title=Release artifact not found in release docs::$artifact"
            fi
          done

          if ! grep -F '| Telemetry | None |' README.md >/dev/null; then
            echo "::warning title=Privacy guardrail wording changed::README.md should keep Telemetry set to None."
          fi

      - name: Report tracked junk and sensitive text
        shell: bash
        run: |
          set -u

          bad_files=()
          unexpected_jars=()
          while IFS= read -r -d '' tracked_file; do
            case "$tracked_file" in
              */build/*|*/.gradle/*|*.class|*.tmp|*.bak)
                bad_files+=("$tracked_file")
                ;;
            esac
            case "$tracked_file" in
              */gradle/wrapper/gradle-wrapper.jar)
                ;;
              Releases/Forge/Minecraft\ 26.1.2/gradlemc-forge-26.1.2-1.0.0.jar|Releases/Forge/Minecraft\ 1.20.1/gradlemc-1.0.3-forge-1.20.1.jar|Releases/Forge/Minecraft\ 1.20.1/gradlemc-1.0.2-forge-1.20.1.jar|Releases/Fabric/Minecraft\ 26.1.2/gradlemc-fabric-26.1.2-1.0.0.jar|Releases/Fabric/Minecraft\ 1.20.1/gradlemc-fabric-1.20.1-1.0.0.jar|Releases/Quilt/Minecraft\ 1.20.1/gradlemc-quilt-1.20.1-1.0.0.jar)
                ;;
              *.jar)
                unexpected_jars+=("$tracked_file")
                ;;
            esac
          done < <(git ls-files -z)

          if (( ${#bad_files[@]} > 0 )); then
            echo "::warning title=Generated or junk files are tracked::Delete these from source control."
            printf ' - %s\n' "${bad_files[@]}"
          fi

          if (( ${#unexpected_jars[@]} > 0 )); then
            echo "::warning title=Unexpected committed jar files::Only wrapper jars and approved release artifacts should be committed."
            printf ' - %s\n' "${unexpected_jars[@]}"
          fi

          pat_a='ghp_[A-Za-z0-9_]{30,}'
          pat_b='github_pat_[A-Za-z0-9_]{30,}'
          pat_c='s''k-[A-Za-z0-9]{20,}'
          sensitive_pattern="(${pat_a}|${pat_b}|${pat_c})"
          if git grep -IInE "$sensitive_pattern" -- . ':(exclude)*.png' ':(exclude)*.jpg' ':(exclude)*.jpeg' ':(exclude)*.webp' ':(exclude)*.gif' ':(exclude)*.jar'; then
            echo "::warning title=Possible sensitive value found::Review the matches above."
          else
            echo "No obvious token-shaped sensitive text found."
          fi

  build-supported-port:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Forge 1.21.11
            runner: ubuntu-latest
            project_dir: GradleMC/Forge/Minecraft 1.21.11
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
            metadata_kind: forge
          - name: Forge 26.1.2
            runner: ubuntu-latest
            project_dir: GradleMC/Forge/Minecraft 26.1.2
            java: "25"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            metadata_kind: forge
          - name: Forge 1.20.1
            # Scan v1's path-redaction self-test intentionally validates Windows path semantics.
            runner: windows-latest
            project_dir: GradleMC/Forge/Minecraft 1.20.1
            java: "17"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
            metadata_kind: forge
          - name: Fabric 1.21.11
            runner: ubuntu-latest
            project_dir: GradleMC/Fabric/Minecraft 1.21.11
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            metadata_kind: fabric
          - name: Fabric 26.1.2
            runner: ubuntu-latest
            project_dir: GradleMC/Fabric/Minecraft 26.1.2
            java: "25"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            metadata_kind: fabric
          - name: Fabric 1.20.1
            runner: ubuntu-latest
            project_dir: GradleMC/Fabric/Minecraft 1.20.1
            # Loom/Gradle runs on Java 21 while the project toolchain still emits Java 17 bytecode.
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            metadata_kind: fabric
          - name: NeoForge 1.21.11
            runner: ubuntu-latest
            project_dir: GradleMC/NeoForge/Minecraft 1.21.11
            java: "21"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
            metadata_kind: neoforge
          - name: NeoForge 26.1.2
            runner: ubuntu-latest
            project_dir: GradleMC/NeoForge/Minecraft 26.1.2
            java: "25"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            metadata_kind: neoforge
          - name: Quilt 1.20.1
            runner: ubuntu-latest
            project_dir: GradleMC/Quilt/Minecraft 1.20.1
            java: "17"
            command: ./gradlew --no-daemon --stacktrace --warning-mode all clean build
            metadata_kind: quilt

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
          cache-dependency-path: |
            ${{ matrix.project_dir }}/**/*.gradle
            ${{ matrix.project_dir }}/**/*.gradle.kts
            ${{ matrix.project_dir }}/gradle.properties
            ${{ matrix.project_dir }}/gradle/wrapper/gradle-wrapper.properties

      - name: Prepare Gradle wrapper
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null

          if grep -q '^org.gradle.java.home=' gradle.properties; then
            echo "Removing local developer org.gradle.java.home from gradle.properties for CI. setup-java is the source of truth."
            sed -i '/^org.gradle.java.home=/d' gradle.properties
          fi

          distribution_url="$(sed -n 's/^distributionUrl=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          distribution_url="${distribution_url//\\:/:}"
          [[ "$distribution_url" == https://services.gradle.org/distributions/gradle-*-bin.zip ]] || {
            echo "Unexpected Gradle wrapper distributionUrl: $distribution_url" >&2
            exit 1
          }

          timeout_ms="$(sed -n 's/^networkTimeout=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          if [[ -z "$timeout_ms" ]]; then
            echo "networkTimeout=60000" >> gradle/wrapper/gradle-wrapper.properties
          elif [[ "$timeout_ms" =~ ^[0-9]+$ ]] && (( timeout_ms < 60000 )); then
            echo "Bumping Gradle wrapper networkTimeout locally for CI: ${timeout_ms}ms -> 60000ms"
            sed -i 's/^networkTimeout=.*/networkTimeout=60000/' gradle/wrapper/gradle-wrapper.properties
          elif [[ ! "$timeout_ms" =~ ^[0-9]+$ ]]; then
            echo "Invalid Gradle wrapper networkTimeout: $timeout_ms" >&2
            exit 1
          fi

          ./gradlew --no-daemon --version

      - name: Resolve and validate source metadata
        id: metadata
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -euo pipefail

          get_property() {
            sed -n "s/^$1=//p" gradle.properties | tail -n 1
          }

          mod_version="$(get_property mod_version)"
          minecraft_version="$(get_property minecraft_version)"
          [[ -n "$mod_version" ]] || { echo "mod_version is empty." >&2; exit 1; }
          [[ -n "$minecraft_version" ]] || { echo "minecraft_version is empty." >&2; exit 1; }

          case "${{ matrix.metadata_kind }}" in
            forge|neoforge)
              mod_id="$(get_property mod_id)"
              loader_name="$(get_property loader_name)"
              variant_name="$(get_property variant_name)"
              artifact_name="$(get_property artifact_name)"
              [[ "$mod_id" == "gradlemc" ]] || { echo "Unexpected ${{ matrix.metadata_kind }} mod_id: $mod_id" >&2; exit 1; }
              if [[ "${{ matrix.metadata_kind }}" == "forge" ]]; then
                [[ "$loader_name" == "forge" || "$loader_name" == "Forge" ]] || { echo "Unexpected Forge loader_name: $loader_name" >&2; exit 1; }
              else
                [[ "$loader_name" == "neoforge" || "$loader_name" == "NeoForge" ]] || { echo "Unexpected NeoForge loader_name: $loader_name" >&2; exit 1; }
              fi
              [[ "$variant_name" == "${{ matrix.metadata_kind }}-$minecraft_version" ]] || {
                echo "Unexpected ${{ matrix.metadata_kind }} variant_name: $variant_name" >&2
                exit 1
              }
              ;;
            fabric|quilt)
              archives_base_name="$(get_property archives_base_name)"
              [[ -n "$archives_base_name" ]] || { echo "archives_base_name is empty." >&2; exit 1; }
              artifact_name="${archives_base_name}-${mod_version}.jar"
              ;;
            *)
              echo "Unknown metadata kind: ${{ matrix.metadata_kind }}" >&2
              exit 1
              ;;
          esac

          [[ "$artifact_name" =~ ^[A-Za-z0-9._+-]+\.jar$ ]] || {
            echo "Unsafe or invalid artifact filename: $artifact_name" >&2
            exit 1
          }

          echo "minecraft_version=$minecraft_version"
          echo "mod_version=$mod_version"
          echo "artifact_name=$artifact_name"
          echo "artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build and verify
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -o pipefail
          ${{ matrix.command }} 2>&1 | tee ci-gradle.log

      - name: Verify built artifact
        id: verify-artifact
        shell: bash
        working-directory: ${{ matrix.project_dir }}
        run: |
          set -euo pipefail

          artifact_name="${{ steps.metadata.outputs.artifact-name }}"
          jar_path="build/libs/$artifact_name"

          [[ -f "$jar_path" ]] || {
            echo "Expected jar not found: $jar_path" >&2
            echo "Actual jars:" >&2
            find build/libs -maxdepth 1 -type f -name '*.jar' -print >&2 || true
            exit 1
          }

          jar tf "$jar_path" >/dev/null
          rm -rf build/ci-artifact-check
          mkdir -p build/ci-artifact-check

          case "${{ matrix.metadata_kind }}" in
            forge)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF META-INF/mods.toml pack.mcmeta)
              for required_entry in META-INF/MANIFEST.MF META-INF/mods.toml pack.mcmeta; do
                [[ -f "build/ci-artifact-check/$required_entry" ]] || {
                  echo "Jar is missing required Forge entry: $required_entry" >&2
                  exit 1
                }
              done
              grep -F 'modId="gradlemc"' build/ci-artifact-check/META-INF/mods.toml >/dev/null || {
                echo "mods.toml inside jar does not contain modId=gradlemc." >&2
                exit 1
              }
              ;;
            neoforge)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF META-INF/neoforge.mods.toml pack.mcmeta)
              for required_entry in META-INF/MANIFEST.MF META-INF/neoforge.mods.toml pack.mcmeta; do
                [[ -f "build/ci-artifact-check/$required_entry" ]] || {
                  echo "Jar is missing required NeoForge entry: $required_entry" >&2
                  exit 1
                }
              done
              grep -F 'modId="gradlemc"' build/ci-artifact-check/META-INF/neoforge.mods.toml >/dev/null || {
                echo "neoforge.mods.toml inside jar does not contain modId=gradlemc." >&2
                exit 1
              }
              ;;
            fabric)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF fabric.mod.json)
              [[ -f build/ci-artifact-check/fabric.mod.json ]] || {
                echo "Jar is missing fabric.mod.json." >&2
                exit 1
              }
              grep -F '"id": "gradlemc"' build/ci-artifact-check/fabric.mod.json >/dev/null || {
                echo "fabric.mod.json inside jar does not contain id=gradlemc." >&2
                exit 1
              }
              ;;
            quilt)
              (cd build/ci-artifact-check && jar xf "../libs/$artifact_name" META-INF/MANIFEST.MF quilt.mod.json)
              [[ -f build/ci-artifact-check/quilt.mod.json ]] || {
                echo "Jar is missing quilt.mod.json." >&2
                exit 1
              }
              grep -F '"id": "gradlemc"' build/ci-artifact-check/quilt.mod.json >/dev/null || {
                echo "quilt.mod.json inside jar does not contain id=gradlemc." >&2
                exit 1
              }
              ;;
          esac

          if grep -R '\${' build/ci-artifact-check; then
            echo "Jar metadata contains unexpanded template placeholders." >&2
            exit 1
          fi

          echo "Verified artifact: $jar_path"
          echo "artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.verify-artifact.outputs.artifact-name }}
          path: ${{ matrix.project_dir }}/build/libs/${{ steps.verify-artifact.outputs.artifact-name }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Gradle reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-reports-${{ matrix.name }}
          path: |
            ${{ matrix.project_dir }}/ci-gradle.log
            ${{ matrix.project_dir }}/build/reports/**
            ${{ matrix.project_dir }}/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
