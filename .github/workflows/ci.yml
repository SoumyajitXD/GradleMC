name: GradleMC CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant id to build, or all for enabled variants"
        required: false
        default: "forge-1.20.1"
      includePlanned:
        description: "Include planned variants in generated matrix"
        required: false
        default: false
        type: boolean
      includeExperimental:
        description: "Include experimental variants in generated matrix"
        required: false
        default: false
        type: boolean
      pythonVersion:
        description: "Python version for automation validation"
        required: false
        default: "3.12"
      nodeVersion:
        description: "Node version if Node tooling exists"
        required: false
        default: "22"
      runPowerShellChecks:
        description: "Run PowerShell wrapper checks"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: "SOURCE CODE"
  PYTHONPATH: "${{ github.workspace }}/SOURCE CODE/tools/python"

jobs:
  automation-validation:
    name: Automation validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository layout
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          [[ -d "$PROJECT_DIR" ]] || { echo "Missing source directory: $PROJECT_DIR" >&2; exit 1; }
          [[ ! -d "SOURCE CODEs" ]] || { echo "Stale source root exists: SOURCE CODEs" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/gradlew" ]] || { echo "Missing Gradle wrapper in $PROJECT_DIR" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/settings.gradle" || -f "$PROJECT_DIR/settings.gradle.kts" ]] || { echo "Missing Gradle settings in $PROJECT_DIR" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/build.gradle" || -f "$PROJECT_DIR/build.gradle.kts" ]] || { echo "Missing Gradle build file in $PROJECT_DIR" >&2; exit 1; }
          [[ -f "$PROJECT_DIR/tools/python/gradlemc_automation/__init__.py" ]] || { echo "Missing Python automation package" >&2; exit 1; }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.pythonVersion || '3.12' }}

      - name: Setup Node only when package.json exists
        if: ${{ hashFiles('SOURCE CODE/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event_name == 'workflow_dispatch' && inputs.nodeVersion || '22' }}
          cache: npm
          cache-dependency-path: SOURCE CODE/package-lock.json

      - name: Prepare Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null
          timeout_ms="$(sed -n 's/^networkTimeout=//p' gradle/wrapper/gradle-wrapper.properties | tail -n 1)"
          [[ "$timeout_ms" =~ ^[0-9]+$ ]] || { echo "Invalid Gradle wrapper networkTimeout: $timeout_ms" >&2; exit 1; }
          if (( timeout_ms < 60000 )); then
            echo "Gradle wrapper networkTimeout is too low for CI: ${timeout_ms}ms" >&2
            exit 1
          fi
          ./gradlew --no-daemon --version

      - name: Check automation tools
        run: ./gradlew --no-daemon --stacktrace checkAutomationTools

      - name: Validate matrix and project checks
        run: ./gradlew --no-daemon --stacktrace validateVariantMatrix checkProjectIdentity checkCommandCasing checkFalseSupportClaims checkReleaseMetadata

      - name: Generate GitHub matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.includePlanned }}" == "true" ]]; then
              args+=(--include-planned)
            fi
            if [[ "${{ inputs.includeExperimental }}" == "true" ]]; then
              args+=(--include-experimental)
            fi
            if [[ -n "${{ inputs.variant }}" && "${{ inputs.variant }}" != "all" ]]; then
              args+=(--only-variant "${{ inputs.variant }}")
            fi
          fi
          python -m gradlemc_automation.generate_github_matrix "${args[@]}" --output build/generated/gradlemc/github-matrix.json
          matrix="$(tr -d '\n' < build/generated/gradlemc/github-matrix.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-enabled-variants:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: automation-validation
    if: ${{ needs.automation-validation.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.automation-validation.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25

      - name: Prepare Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          ./gradlew --no-daemon --version

      - name: Build selected variant
        run: ./gradlew --no-daemon --stacktrace buildVariant -PgradlemcVariant=${{ matrix.variant }}

      - name: Upload real build artifact
        if: ${{ success() && matrix.buildable }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ env.PROJECT_DIR }}/build/libs/${{ matrix.artifactName }}
          if-no-files-found: error
          retention-days: 14

  python-tooling-test:
    name: Python tooling ${{ matrix.python }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.12"
          - "3.13"
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run Python automation tests
        run: |
          set -euo pipefail
          python -m gradlemc_automation.validate_variants
          python -m gradlemc_automation.generate_github_matrix
          python -m gradlemc_automation.generate_docs_tables
          python -m gradlemc_automation.check_claims
          python -m gradlemc_automation.check_command_casing
          python -m gradlemc_automation.validate_release
          python -m unittest discover -s tools/python/tests

  node-tooling-test:
    name: Node tooling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ hashFiles('SOURCE CODE/package.json') != '' }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event_name == 'workflow_dispatch' && inputs.nodeVersion || '22' }}
          cache: npm
          cache-dependency-path: SOURCE CODE/package-lock.json
      - name: Run Node checks
        run: |
          set -euo pipefail
          npm ci
          npm run check
          if npm run | grep -q "typecheck"; then
            npm run typecheck
          fi

  powershell-wrapper-test:
    name: PowerShell wrappers
    runs-on: windows-latest
    timeout-minutes: 15
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runPowerShellChecks }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check environment
        shell: pwsh
        run: pwsh ./tools/pwsh/check-env.ps1
      - name: Run validation wrapper
        shell: pwsh
        run: pwsh ./tools/pwsh/validate.ps1
