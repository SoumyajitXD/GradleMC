name: One-time Forge 1.20.1 V1.0.3 release sync

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - .github/release-sync-trigger.txt

permissions:
  contents: write

jobs:
  sync-release:
    if: github.head_ref == 'release/forge-1.0.3-sync'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle
            GradleMC/Forge/Minecraft 1.20.1/gradle.properties
            GradleMC/Forge/Minecraft 1.20.1/gradle/wrapper/gradle-wrapper.properties

      - name: Apply repository synchronization
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/release_sync_1_0_3.py
          rm -f .github/release-sync-trigger.txt

      - name: Verify uploaded release jar
        shell: bash
        run: |
          set -euo pipefail
          jar_path='Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.3-forge-1.20.1.jar'
          test -f "$jar_path"
          jar tf "$jar_path" >/dev/null
          test ! -e 'Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.2-forge-1.20.1.jar'

      - name: Build and test Forge 1.20.1
        working-directory: GradleMC/Forge/Minecraft 1.20.1
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
          ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
          test -f build/libs/gradlemc-1.0.3-forge-1.20.1.jar
          jar tf build/libs/gradlemc-1.0.3-forge-1.20.1.jar >/dev/null

      - name: Verify synchronized release surface
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx 'mod_version=1.0.3' 'GradleMC/Forge/Minecraft 1.20.1/gradle.properties'
          grep -Fx 'artifact_name=gradlemc-1.0.3-forge-1.20.1.jar' 'GradleMC/Forge/Minecraft 1.20.1/gradle.properties'
          grep -F 'OVERLAY_SHOW_BRANDING' 'GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/config/GradleMCConfig.java'
          grep -F 'OVERLAY_SHOW_AVERAGE_FPS' 'GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/config/GradleMCConfig.java'
          grep -F 'withCurrentFps(minecraft.getFps())' 'GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/client/overlay/GradleMCStatsOverlay.java'
          grep -F 'gradlemc-1.0.3-forge-1.20.1.jar' README.md CHANGELOG.md ROADMAP.md SUPPORT.md SECURITY.md CONTRIBUTING.md AGENTS.md docs/RELEASE_CHECKLIST.md curseforge-description.html .github/workflows/ci.yml
          stale="$(git grep -n 'gradlemc-1.0.2-forge-1.20.1.jar' -- . ':(exclude)CHANGELOG.md' || true)"
          if [[ -n "$stale" ]]; then
            echo 'Unexpected stale V1.0.2 references:'
            echo "$stale"
            exit 1
          fi
          test ! -e .github/workflows/release-sync-1.0.3.yml
          test ! -e .github/scripts/release_sync_1_0_3.py
          test ! -e .github/release-sync-trigger.txt

      - name: Commit verified synchronization to release branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo 'No synchronization changes found.'; exit 1; }
          git commit -m 'Sync Forge 1.20.1 V1.0.3 release'
          git push origin HEAD:${{ github.head_ref }}
