name: One-time Forge 1.20.1 V1.0.3 release sync

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-sync-1.0.3.yml

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            GradleMC/Forge/Minecraft 1.20.1/**/*.gradle
            GradleMC/Forge/Minecraft 1.20.1/gradle.properties
            GradleMC/Forge/Minecraft 1.20.1/gradle/wrapper/gradle-wrapper.properties

      - name: Apply V1.0.3 source and release synchronization
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/release_sync_1_0_3.py

      - name: Verify uploaded release jar identity
        shell: bash
        run: |
          set -euo pipefail
          jar_path="Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.3-forge-1.20.1.jar"
          test -f "$jar_path"
          jar tf "$jar_path" >/dev/null
          rm -rf /tmp/gradlemc-release-check
          mkdir -p /tmp/gradlemc-release-check
          (cd /tmp/gradlemc-release-check && jar xf "$GITHUB_WORKSPACE/$jar_path" META-INF/mods.toml META-INF/MANIFEST.MF)
          grep -F 'modId="gradlemc"' /tmp/gradlemc-release-check/META-INF/mods.toml >/dev/null
          if ! grep -F '1.0.3' /tmp/gradlemc-release-check/META-INF/mods.toml /tmp/gradlemc-release-check/META-INF/MANIFEST.MF >/dev/null; then
            echo "Uploaded jar metadata does not identify GradleMC V1.0.3." >&2
            exit 1
          fi

      - name: Build, test, and verify Forge 1.20.1
        shell: bash
        working-directory: GradleMC/Forge/Minecraft 1.20.1
        run: |
          set -euo pipefail
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace --warning-mode all clean check gradlemcSelfTest assemble
          test -f build/libs/gradlemc-1.0.3-forge-1.20.1.jar
          jar tf build/libs/gradlemc-1.0.3-forge-1.20.1.jar >/dev/null

      - name: Verify synchronized repository surface
        shell: bash
        run: |
          set -euo pipefail
          test -f "Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.3-forge-1.20.1.jar"
          test ! -e "Releases/Forge/Minecraft 1.20.1/gradlemc-1.0.2-forge-1.20.1.jar"
          grep -F 'mod_version=1.0.3' "GradleMC/Forge/Minecraft 1.20.1/gradle.properties" >/dev/null
          grep -F 'artifact_name=gradlemc-1.0.3-forge-1.20.1.jar' "GradleMC/Forge/Minecraft 1.20.1/gradle.properties" >/dev/null
          grep -F 'OVERLAY_SHOW_BRANDING' "GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/config/GradleMCConfig.java" >/dev/null
          grep -F 'OVERLAY_SHOW_AVERAGE_FPS' "GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/config/GradleMCConfig.java" >/dev/null
          grep -F 'withCurrentFps(minecraft.getFps())' "GradleMC/Forge/Minecraft 1.20.1/src/main/java/com/soumyajit/gradlemc/client/overlay/GradleMCStatsOverlay.java" >/dev/null
          grep -F 'gradlemc-1.0.3-forge-1.20.1.jar' README.md CHANGELOG.md ROADMAP.md SUPPORT.md SECURITY.md CONTRIBUTING.md AGENTS.md docs/RELEASE_CHECKLIST.md curseforge-description.html .github/workflows/ci.yml >/dev/null
          stale="$(git grep -n 'gradlemc-1.0.2-forge-1.20.1.jar' -- . ':(exclude)CHANGELOG.md' || true)"
          if [[ -n "$stale" ]]; then
            echo "Unexpected stale V1.0.2 release references:" >&2
            echo "$stale" >&2
            exit 1
          fi
          test ! -e .github/workflows/release-sync-1.0.3.yml
          test ! -e .github/scripts/release_sync_1_0_3.py

      - name: Commit verified V1.0.3 synchronization
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo "No release synchronization changes found."; exit 1; }
          git commit -m "Sync Forge 1.20.1 V1.0.3 release"
          git push origin HEAD:main
